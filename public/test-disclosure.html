<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux Disclosure Test</title>
    <style>
        .hidden { display: none; }
        [data-open] .hidden { display: block !important; }
        .data-open\:block { display: none; }
        [data-open] .data-open\:block { display: block; }
        button { padding: 10px; margin: 5px; cursor: pointer; background: #3b82f6; color: white; border: none; }
        .panel { padding: 20px; background: #f0f0f0; margin: 10px; }
    </style>
</head>
<body>
    <h1>Flux Disclosure Test</h1>
    
    <ui-disclosure class="group/disclosure">
        <button type="button">Click to Toggle Menu</button>
        <div class="panel hidden data-open:block">
            <p>This is the expanded content!</p>
            <ul>
                <li>Item 1</li>
                <li>Item 2</li>
                <li>Item 3</li>
            </ul>
        </div>
    </ui-disclosure>

    <hr>
    <h2>Test 2 - With open attribute initially</h2>
    <ui-disclosure class="group/disclosure" open>
        <button type="button">Already Open Menu</button>
        <div class="panel hidden data-open:block">
            <p>This should be visible initially</p>
        </div>
    </ui-disclosure>

    <script>
        console.log('Test page loaded');
        console.log('window.Alpine:', typeof window.Alpine);
    </script>
    
    <!-- Load Flux JS -->
    <script src="http://127.0.0.1:8000/flux/flux.js"></script>
    
    <script>
        console.log('After Flux loaded');
        document.querySelectorAll('ui-disclosure').forEach(el => {
            console.log('Found ui-disclosure:', el);
            console.log('Has button:', el.querySelector('button,ui-button'));
            console.log('Last child:', el.lastElementChild);
        });
    </script>
</body>
</html>
